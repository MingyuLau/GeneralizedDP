name: maniskill

task_name: maniskill

shape_meta: &shape_meta
  # acceptable types: rgb, low_dim
  obs:
    point_cloud:
      shape: [1024, 3]
      type: point_cloud
    agent_pos:
      shape: [9]
      type: low_dimx
    sparse_actions:
      shape: [3]
      type: low_dimx
  action:
    shape: [7]

env_runner: null

dataset:
  _target_: diffusion_policy_3d.dataset.zzskill_dataset.ZzskillDataset
  zarr_path: /home/hz/code/GeneralizedDP/3D-Diffusion-Policy/data/dataset/maniskill
  # zarr_path: /home/hz/code/GeneralizedDP/3D-Diffusion-Policy/data/dataset/zzskill

  # _target_: diffusion_policy_3d.dataset.zzcalvin_dataset.zzCalvinDataset
  # zarr_path: /home/hz/code/GeneralizedDP/3D-Diffusion-Policy/data/dataset/calvin

  # _target_: diffusion_policy_3d.dataset.zzlibero_dataset.zzLiberoDataset
  # zarr_path: /home/hz/code/GeneralizedDP/3D-Diffusion-Policy/data/dataset/LIBERO

  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: 500
